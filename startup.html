<!DOCTYPE html>
<html>
<head>
  <title>Startup News Hub</title>

  <style>
    body {
      font-family: Arial;
      background: #020617;
      color: white;
      margin: 0;
    }

    header {
      background: #f97316;
      padding: 15px;
      text-align: center;
      font-size: 24px;
      font-weight: bold;
    }

    .container {
      width: 90%;
      margin: auto;
    }

    .article {
      background: #1e293b;
      margin: 20px 0;
      padding: 15px;
      border-radius: 10px;
      display: flex;
      gap: 15px;
    }

    .article img {
      width: 200px;
      border-radius: 10px;
    }

    .content {
      text-align: left;
    }

    .content h2 {
      color: #facc15;
    }

    .date {
      font-size: 12px;
      color: gray;
    }

    .tag {
      background: #22c55e;
      padding: 3px 8px;
      border-radius: 5px;
      font-size: 12px;
      margin-right: 5px;
    }

    .back-btn {
      display: block;
      margin: 20px auto;
      padding: 10px 20px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .form-box {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
      text-align: center;
    }

    input, textarea {
      width: 90%;
      margin: 5px;
      padding: 8px;
      border-radius: 5px;
      border: none;
    }

    button {
      padding: 10px;
      margin: 5px;
      background: #f97316;
      border: none;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🚀 Startup News & Ideas</header>

<div class="container">

  <!-- ADD STARTUP -->
  <div class="form-box">
    <h3>Add Your Startup Idea</h3>
    <input id="title" placeholder="Startup Name">
    <input id="domain" placeholder="Domain (AI, Fintech)">
    <textarea id="desc" placeholder="Describe your idea..."></textarea>
    <button onclick="addStartup()">Submit</button>
  </div>

  <!-- LIST -->
  <div id="list"></div>

  <button class="back-btn" onclick="goBack()">⬅ Back</button>

</div>

<script>

// ADD
async function addStartup() {
  const idea = {
    title: document.getElementById("title").value,
    domain: document.getElementById("domain").value,
    description: document.getElementById("desc").value,
    type: "startup",
    time: new Date().toLocaleString()
  };

  await fetch("/add", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(idea)
  });

  load();
}

// LOAD
async function load() {
  const res = await fetch("/ideas");
  const data = await res.json();

  let html = "";

  data.forEach(i => {
    if (i.type === "startup") {
      html += `
        <div class="article">
          <img src="https://source.unsplash.com/200x150/?startup,technology">

          <div class="content">
            <h2>${i.title}</h2>
            <span class="tag">${i.domain}</span>
            <p class="date">${i.time || ""}</p>

            <p>
              ${i.description}
            </p>

            <p>
              This startup idea focuses on solving real-world problems using innovation and technology.
              It has potential to scale and attract investors if executed properly.
            </p>
          </div>
        </div>
      `;
    }
  });

  document.getElementById("list").innerHTML = html;
}

// BACK
function goBack() {
  window.location.href = "/";
}

// AUTO LOAD
window.onload = load;

</script>

</body>
</html>
