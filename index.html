/* ✨ Glow effect on heading */

}

}

  top: 0;

}

}
/* 🔥 Full Page Background */
 
/* 💎 Glassmorphism Form */
.form-box {
  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(15px);
  border-radius: 20px;
  padding: 20px;
  box-shadow: 0 0 25px rgba(0, 200, 255, 0.5);
  border: 1px solid rgba(255,255,255,0.2);
}

/* ✨ Input Fields */
input, textarea, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
}

/* 🌟 Input Focus Effect */
input:focus, textarea:focus {
  box-shadow: 0 0 10px #00c6ff;
}

/* 🚀 Submit Button */

}

.submit-btn:hover {

}

/* 🧠 Idea Cards */

  backdrop-filter: blur(10px);

}

.idea-card:hover {

/* Dark overlay */

navbar {

}
     /* ✨ Light hover */

}

  border-radius: 10px;

}
dropdown-menu div {

}

form-box {
  width: 350px;
  padding: 25px;

  background: rgba(255, 255, 255, 0.12);

/* ===== INPUT FIELDS ===== */

 .collab-menu {

</div>

    <span onclick="setActive(this)">Domains</span>

    <!-- Domain Dropdown -->

      <span onclick="toggleDropdown(this)">Domain ⬇</span>

      <div class="dropdown-menu">
        <div onclick="selectDomain('Education')">🎓 Education</div>
        <div onclick="selectDomain('AI')">🤖 AI</div>
        <div onclick="selectDomain('Web')">🌐 Web</div>

   <div id="collabMenu" class="collab-menu">

    <button onclick="selectType('idea')">✍️ Add Idea</button>
    <button onclick="selectType('research')">📄 Research Journal</button>
    <button onclick="selectType('SUGGEST IMPROVEMENTS')">Suggest Improvements</button>
    <button onclick="selectType('startup')">🚀 Startup Idea</button>

    <button onclick="closeMenu()" class="close-btn">Close</button>
  </div>
</div>
    
</head>
<body>

<h1>💡 Idea Repository Platform</h1>
 

<div class="container">

    <div class="form-box">
        <input id="title" placeholder="Idea Title">
        <input id="domain" placeholder="Domain (AI, Web, Startup)">
        <textarea id="desc" placeholder="Describe your idea..."></textarea>
        <button onclick="addIdea()">🚀 Submit Idea</button>
    </div>

    <h2 style="color:white;">All Ideas</h2>
    <div id="list"></div>

</div>


<p id="status"></p>
<button type="button" class="small-btn" onclick="checkStatus()">🟢 Check Server Status</button>
<script>
async function addIdea() {
    const idea = {
        title: document.getElementById("title").value,
        domain: document.getElementById("domain").value,
        description: document.getElementById("desc").value
    };

    await fetch("/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(idea)
    });

    loadIdeas();
}


async function loadIdeas() {
  const res = await fetch("https://web-development-int-222-repository.onrender.com/ideas");
  const data = await res.json();

  let html = "";

  data.forEach(i => {
    html += `
      <div class="idea-card">
        <h3>${i.title}</h3>
        <p class="domain">${i.domain}</p>
        <p>${i.description}</p>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

loadIdeas();
 async function checkStatus() {
    const res = await fetch("/status");
    const data = await res.json();

    document.getElementById("status").innerText =
        data.status + " at " + data.time;
 }


function showMessage(text, color) {
  const box = document.getElementById("messageBox");
  box.style.display = "block";
  box.style.background = color;
  box.style.color = "#fff";
  box.innerText = text;

  setTimeout(() => {
    box.style.display = "none";
  }, 2000);
}

document.querySelector(".comment-btn").addEventListener("click", () => {
  const input = document.querySelector(".comment-input");

  if (input.value.trim() === "") {
    showMessage("⚠️ Please write a suggestion!", "#dc3545");
    return;
  }

  showMessage("✅ Suggestion added!", "#28a745");
  input.value = "";
});

document.querySelector(".collab-btn").addEventListener("click", () => {
      showMessage("💛 Collaboration request sent!", "#007bff");
});
 function openMenu() {
  document.getElementById("collabMenu").style.display = "flex";
}

function closeMenu() {
  document.getElementById("collabMenu").style.display = "none";
}

function selectType(type) {
    closeMenu();

    if (type === "idea") {
        showMessage("Add your idea 👍", "green");
    }

    else if (type === "research") {
        showMessage("Upload research journal 📄", "blue");
        setTimeout(() => {
            window.location.href = "research.html";
        }, 500);
    }

    else if (type === "SUGGEST IMPROVEMENTS") {
        showMessage("Suggest improvements 💡", "purple");
        setTimeout(() => {
            window.location.href = "improvements.html";
        }, 500);
    }

    else if (type === "startup") {
        showMessage("Submit startup idea 🚀", "orange");
        setTimeout(() => {
            window.location.href = "startup.html";
        }, 500);
    }
}
 
 
</script>

</body>
</html>
