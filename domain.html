<!DOCTYPE html>
<html>
<head>
    <title>Domain Page</title>

    <style>
        body {
            font-family: Arial;
            background: #020617;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 30px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 30px;
        }

        .card {
            width: 250px;
            background: #1e293b;
            margin: 15px;
            border-radius: 10px;
            overflow: hidden;
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card h3 {
            margin: 10px;
        }

        .card a {
            display: inline-block;
            margin: 10px;
            padding: 8px 12px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 5px;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            background: orange;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<h1 id="domainTitle"></h1>

<div class="container" id="content"></div>

<button onclick="goBack()">⬅ Back</button>

<script>
const params = new URLSearchParams(window.location.search);
const domain = params.get("domain");

document.getElementById("domainTitle").innerText = "📂 " + domain + " Domain";

// Sample content for domains
const data = {
    AI: [
        {
            title: "AI Basics",
            img: "https://source.unsplash.com/300x200/?ai",
            link: "https://en.wikipedia.org/wiki/Artificial_intelligence"
        },
        {
            title: "Machine Learning",
            img: "https://source.unsplash.com/300x200/?machine-learning",
            link: "https://www.ibm.com/topics/machine-learning"
        }
    ],

    Web: [
        {
            title: "HTML Guide",
            img: "https://source.unsplash.com/300x200/?html",
            link: "https://developer.mozilla.org/en-US/docs/Web/HTML"
        },
        {
            title: "CSS Tricks",
            img: "https://source.unsplash.com/300x200/?css",
            link: "https://css-tricks.com/"
        }
    ],

    Python: [
        {
            title: "Python Docs",
            img: "https://source.unsplash.com/300x200/?python",
            link: "https://docs.python.org/3/"
        }
    ],

    Cyber: [
        {
            title: "Cyber Security",
            img: "https://source.unsplash.com/300x200/?cyber-security",
            link: "https://www.kaspersky.com/resource-center"
        }
    ],

    Education: [
        {
            title: "Online Learning",
            img: "https://source.unsplash.com/300x200/?education",
            link: "https://www.coursera.org/"
        }
    ]
};

// Display cards
const container = document.getElementById("content");

data[domain].forEach(item => {
    container.innerHTML += `
        <div class="card">
            <img src="${item.img}">
            <h3>${item.title}</h3>
            <a href="${item.link}" target="_blank">Visit</a>
        </div>
    `;
});

function goBack() {
    window.location.href = "index.html";
}
</script>

</body>
</html>
