<!DOCTYPE html>
<html>
<head>
    <title>Domain Ideas</title>

    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            font-size: 36px;
            color: #38bdf8;
        }

        /* Grid */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            padding: 30px;
        }

        /* Card */
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            transition: 0.4s;
            box-shadow: 0 0 15px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-10px) scale(1.03);
            box-shadow: 0 0 25px #38bdf8;
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .card-content {
            padding: 15px;
        }

        .card h3 {
            margin: 10px 0;
        }

        .card p {
            font-size: 14px;
            opacity: 0.8;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 12px;
            background: #38bdf8;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 13px;
        }

        .btn:hover {
            background: #0284c7;
        }

        .back-btn {
            margin: 15px;
            padding: 10px 20px;
            border: none;
            background: orange;
            color: white;
            border-radius: 8px;
            cursor: pointer;
        }

        .back-btn:hover {
            background: darkorange;
        }
    </style>
</head>

<body>

<h1 id="domainTitle">Domain Ideas</h1>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<div class="grid" id="content"></div>

<script>
    const params = new URLSearchParams(window.location.search);
    const domain = params.get("domain");

    document.getElementById("domainTitle").innerText = domain + " Ideas";

    const content = document.getElementById("content");

    const ideas = {
        AI: [
            {
                title: "AI Chatbot",
                img: "https://images.unsplash.com/photo-1677442136019-21780ecad995",
                desc: "Smart chatbot for answering questions",
                link: "https://en.wikipedia.org/wiki/Chatbot"
            },
            {
                title: "Face Detection",
                img: "https://images.unsplash.com/photo-1581090700227-1e8c4a36f0d4",
                desc: "Detect faces using AI models",
                link: "https://en.wikipedia.org/wiki/Facial_recognition_system"
            }
        ],
        Python: [
            {
                title: "Automation Tool",
                img: "https://images.unsplash.com/photo-1515879218367-8466d910aaa4",
                desc: "Automate daily tasks using Python",
                link: "https://realpython.com/"
            },
            {
                title: "Web Scraper",
                img: "https://images.unsplash.com/photo-1555066931-4365d14bab8c",
                desc: "Extract data from websites",
                link: "https://beautiful-soup-4.readthedocs.io/"
            }
        ],
        Web: [
            {
                title: "Portfolio Website",
                img: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6",
                desc: "Show your projects online",
                link: "https://developer.mozilla.org/"
            },
            {
                title: "Blog Platform",
                img: "https://images.unsplash.com/photo-1499750310107-5fef28a66643",
                desc: "Write and share blogs",
                link: "https://medium.com/"
            }
        ],
        Cyber: [
            {
                title: "Password Checker",
                img: "https://images.unsplash.com/photo-1555949963-aa79dcee981c",
                desc: "Check password strength",
                link: "https://owasp.org/"
            },
            {
                title: "Encryption Tool",
                img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b",
                desc: "Secure data using encryption",
                link: "https://en.wikipedia.org/wiki/Encryption"
            }
        ],
        Education: [
            {
                title: "Learning App",
                img: "https://images.unsplash.com/photo-1584697964403-1c4b7b2b7b5c",
                desc: "Online education platform",
                link: "https://coursera.org"
            },
            {
                title: "Quiz System",
                img: "https://images.unsplash.com/photo-1588072432836-e10032774350",
                desc: "Practice MCQs online",
                link: "https://quizizz.com"
            }
        ]
    };

    if (ideas[domain]) {
        ideas[domain].forEach(item => {
            content.innerHTML += `
                <div class="card">
                    <img src="${item.img}">
                    <div class="card-content">
                        <h3>${item.title}</h3>
                        <p>${item.desc}</p>
                        <a href="${item.link}" target="_blank" class="btn">Read More</a>
                    </div>
                </div>
            `;
        });
    } else {
        content.innerHTML = "<p>No ideas found</p>";
    }

    function goBack() {
        window.history.back();
    }
</script>

</body>
</html>
