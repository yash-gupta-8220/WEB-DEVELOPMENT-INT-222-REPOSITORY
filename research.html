<!DOCTYPE html>
<html>
<head>
  <title>Startup Ideas</title>

  <style>
    body {
      font-family: Arial;
      background: linear-gradient(to right, #020617, #1e293b);
      color: white;
      text-align: center;
    }

    h1 {
      color: orange;
    }

    .form-box {
      background: #1e293b;
      padding: 20px;
      width: 300px;
      margin: 20px auto;
      border-radius: 10px;
    }

    input, textarea {
      width: 90%;
      margin: 5px;
      padding: 8px;
    }

    button {
      padding: 10px;
      margin: 5px;
      cursor: pointer;
      background: orange;
      border: none;
      color: white;
    }

    .card {
      background: #334155;
      margin: 10px;
      padding: 10px;
      border-radius: 8px;
    }
  </style>
</head>

<body>

<h1>🚀 Startup Ideas</h1>

<div class="form-box">
  <input id="title" placeholder="Startup Name">
  <input id="domain" placeholder="Domain (AI, Fintech)">
  <textarea id="desc" placeholder="Description"></textarea>

  <button onclick="addStartup()">Add Startup</button>
</div>

<h2>All Startup Ideas</h2>
<div id="list"></div>

<button onclick="goBack()">⬅ Back</button>

<script>

// ADD STARTUP
async function addStartup() {
  const idea = {
    title: document.getElementById("title").value,
    domain: document.getElementById("domain").value,
    description: document.getElementById("desc").value,
    type: "startup"
  };

  await fetch("/add", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(idea)
  });

  loadStartups();
}

// LOAD STARTUPS
async function loadStartups() {
  const res = await fetch("/ideas");
  const data = await res.json();

  let html = "";

  data.forEach(i => {
    if (i.type === "startup") {
      html += `
        <div class="card">
          <h3>${i.title}</h3>
          <p>${i.domain}</p>
          <p>${i.description}</p>
        </div>
      `;
    }
  });

  document.getElementById("list").innerHTML = html;
}

// BACK BUTTON
function goBack() {
  window.location.href = "/";
}

// AUTO LOAD
window.onload = loadStartups;

</script>

</body>
</html>
