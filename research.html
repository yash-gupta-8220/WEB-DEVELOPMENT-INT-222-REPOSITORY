<!DOCTYPE html>
<html>
<head>
  <title>Research Journal Hub</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background: linear-gradient(to right, #020617, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      background: #0ea5e9;
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
    }

    h2 {
      margin-top: 20px;
      color: #38bdf8;
    }

    /* FORM */
    .form-box {
      background: #1e293b;
      padding: 20px;
      width: 320px;
      margin: 20px auto;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
    }

    input, textarea, button {
      width: 90%;
      margin: 8px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: #38bdf8;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #0284c7;
    }

    /* SEARCH */
    #search {
      width: 60%;
      padding: 10px;
      margin: 15px;
      border-radius: 8px;
      border: none;
    }

    /* CARDS */
    .research-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background: #334155;
      margin: 15px;
      padding: 15px;
      border-radius: 12px;
      width: 260px;
      text-align: left;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .card h3 {
      color: #facc15;
    }

    .meta {
      font-size: 12px;
      color: #94a3b8;
    }

    .like-btn {
      margin-top: 10px;
      background: #22c55e;
      font-size: 12px;
    }

    .back-btn {
      margin: 20px;
      background: #f97316;
    }

  </style>
</head>

<body>

<header>📄 Research Journal Hub</header>

<h2>Add Research Paper</h2>

<!-- FORM -->
<div class="form-box">
  <input id="title" placeholder="Research Title">
  <input id="field" placeholder="Field (AI, Cyber, Web)">
  <textarea id="desc" placeholder="Summary..."></textarea>

  <button onclick="addResearch()">Add Research</button>
</div>

<!-- SEARCH -->
<input id="search" placeholder="🔍 Search research..." onkeyup="searchResearch()">

<h2>📚 Latest Research Articles</h2>

<!-- LIST -->
<div class="research-container" id="list"></div>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<script>
let researches = [
  {
    title: "AI in Healthcare",
    field: "AI",
    desc: "AI is transforming healthcare with smart diagnosis and predictive models.",
    img: "https://images.unsplash.com/photo-1677442135136-760c813028c4",
    date: "2026"
  },
  {
    title: "Cyber Security Trends",
    field: "Cyber",
    desc: "Zero trust and AI security systems are future of cyber protection.",
    img: "https://images.unsplash.com/photo-1518770660439-4636190af475",
    date: "2025"
  },
  {
    title: "Modern Web Tech",
    field: "Web",
    desc: "Next.js, AI UI and serverless apps are shaping the future.",
    img: "https://images.unsplash.com/photo-1555066931-4365d14bab8c",
    date: "2026"
  }
];

// ADD
function addResearch() {
  const title = document.getElementById("title").value;
  const field = document.getElementById("field").value;
  const desc = document.getElementById("desc").value;

  if (!title || !field || !desc) {
    alert("Fill all fields!");
    return;
  }

  researches.push({
    title,
    field,
    desc,
    img: "https://via.placeholder.com/300",
    date: new Date().getFullYear()
  });

  displayResearch();
}

// DISPLAY
function displayResearch(data = researches) {
  let html = "";

  data.forEach((r, index) => {
    html += `
      <div class="card">
        <img src="${r.img}">
        <h3>${r.title}</h3>
        <p class="meta">${r.field} • ${r.date}</p>
        <p>${r.desc}</p>

        <button class="like-btn" onclick="like(${index})">👍 Like</button>
        <a href="#" style="color:#38bdf8;">Read More →</a>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

// SEARCH
function searchResearch() {
  const val = document.getElementById("search").value.toLowerCase();

  const filtered = researches.filter(r =>
    r.title.toLowerCase().includes(val) ||
    r.field.toLowerCase().includes(val)
  );

  displayResearch(filtered);
}

// LIKE
function like(i) {
  alert("👍 You liked: " + researches[i].title);
}

// BACK
function goBack() {
  window.location.href = "/";
}

// AUTO LOAD
window.onload = displayResearch;
</script>

</body>
</html>
